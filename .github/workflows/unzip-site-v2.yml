name: Extract uploaded site zip v2

on:
  push:
    branches:
      - main
    paths:
      - 'miles.bar_*.zip'
      - '.github/workflows/unzip-site-v2.yml'
  workflow_dispatch:

jobs:
  extract-site:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest uploaded zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE=$(ls -t miles.bar_*.zip | head -n 1)
          if [ -z "${ZIP_FILE:-}" ]; then
            echo "No miles.bar zip file found."
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using $ZIP_FILE"

      - name: Extract and clean project files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf __extract_tmp
          mkdir -p __extract_tmp
          unzip -q "$ZIP_FILE" -d __extract_tmp

          find __extract_tmp -type f \( -name '._*' -o -name '.DS_Store' \) -delete
          find __extract_tmp -type d -name '__MACOSX' -prune -exec rm -rf {} +

          ROOT_DIR=$(find __extract_tmp -mindepth 1 -maxdepth 1 -type d ! -name '__MACOSX' | head -n 1)
          if [ -z "${ROOT_DIR:-}" ]; then
            ROOT_DIR="__extract_tmp"
          fi
          echo "Syncing from $ROOT_DIR"

          rsync -a --delete --prune-empty-dirs \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='*.zip' \
            --exclude='node_modules/' \
            --exclude='__MACOSX/' \
            --exclude='._*' \
            --exclude='.DS_Store' \
            "$ROOT_DIR"/ ./

          find . -path './.git' -prune -o -path './.github' -prune -o -type f \( -name '._*' -o -name '.DS_Store' \) -delete
          printf 'node_modules/\n__MACOSX/\n*.zip\n.DS_Store\n' > .gitignore
          rm -rf __extract_tmp

      - name: Commit extracted files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Extract real site files from uploaded zip [skip ci]"
          git push
