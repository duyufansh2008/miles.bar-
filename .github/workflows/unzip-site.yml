name: Extract uploaded site zip

on:
  push:
    branches:
      - main
    paths:
      - 'miles.bar_*.zip'
      - '.github/workflows/unzip-site.yml'
  workflow_dispatch:

jobs:
  extract-site:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest uploaded zip
        shell: bash
        run: |
          set -e
          ZIP_FILE=$(ls -t miles.bar_*.zip | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No miles.bar zip file found."
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "Using $ZIP_FILE"

      - name: Extract and sync project files
        shell: bash
        run: |
          set -e
          rm -rf __extract_tmp
          mkdir -p __extract_tmp
          unzip -q "$ZIP_FILE" -d __extract_tmp

          ROOT_DIR=$(find __extract_tmp -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$ROOT_DIR" ]; then
            ROOT_DIR="__extract_tmp"
          fi

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='__MACOSX/' \
            --exclude='node_modules/' \
            --exclude='README.md' \
            --exclude='*.zip' \
            "$ROOT_DIR"/ ./

          printf 'node_modules/\n__MACOSX/\n*.zip\n.DS_Store\n' > .gitignore
          rm -rf __extract_tmp

      - name: Commit extracted files
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Extract site files from uploaded zip [skip ci]"
          git push
