  <style>
    :root {
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.72);
      --text-faint: rgba(255, 255, 255, 0.42);
      --accent: #73ffd8;

      --glass-bg:
        linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.05) 42%, rgba(255,255,255,0.02) 100%);
      --glass-border: rgba(255,255,255,0.20);
      --glass-shadow:
        inset 0 1px 0 rgba(255,255,255,0.30),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 18px 42px rgba(0,0,0,0.28);

      --blur-strong: blur(34px) saturate(175%);
      --blur-soft: blur(22px) saturate(155%);

      --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);

      --card-rx: 0deg;
      --card-ry: 0deg;
      --card-tx: 0px;
      --card-ty: 0px;
      --shine-x: 50%;
      --shine-y: 50%;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      background: #000;
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      user-select: none;
    }

    body {
      position: relative;
    }

    a, button, input {
      font: inherit;
    }

    /* ===== Background ===== */
    .bg-layer {
      position: absolute;
      inset: -2%;
      width: 104%;
      height: 104%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition:
        opacity 1.4s var(--ease-smooth),
        transform 14s linear,
        filter 1.2s var(--ease-smooth);
      will-change: opacity, transform, filter;
    }
    #bg-a {
  background-color: #1a1a2e; /* 柔和的暗色底，防闪瞎眼 */
  z-index: 1; opacity: 1; transform: scale(1.04);
}

    #bg-b { z-index: 1; opacity: 0; transform: scale(1.08); }

    #overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.22), rgba(0,0,0,0.42)),
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 24%),
    radial-gradient(circle at 80% 24%, rgba(255,255,255,0.04), transparent 20%);
  transition: background 0.7s var(--ease-smooth), backdrop-filter 0.7s var(--ease-smooth);
}

body.dashboard-active #overlay {
  background:
    linear-gradient(180deg, rgba(0,0,0,0.38), rgba(0,0,0,0.58)),
    radial-gradient(circle at 18% 18%, rgba(255,255,255,0.04), transparent 20%),
    radial-gradient(circle at 82% 20%, rgba(255,255,255,0.03), transparent 18%);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

    .ambient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 1s ease;
      animation: blobFloat 16s infinite alternate ease-in-out;
    }

    .blob-1 {
      width: 42vw; height: 42vw;
      top: -10%; left: 6%;
      background: rgba(255, 77, 127, 0.48);
    }
    .blob-2 {
      width: 44vw; height: 44vw;
      right: -8%; bottom: -8%;
      background: rgba(0, 214, 255, 0.44);
      animation-delay: -5s;
    }
    .blob-3 {
      width: 28vw; height: 28vw;
      left: 42%; top: 34%;
      background: rgba(131, 95, 255, 0.40);
      animation-delay: -9s;
    }

    @keyframes blobFloat {
      0%   { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
      100% { transform: translate3d(45px,75px,0) scale(1.08) rotate(12deg); }
    }

    body.dashboard-active .ambient-blob {
  opacity: 0.18;
}

    /* ===== Cursor Glow ===== */
    #cursor-glow {
      position: fixed;
      width: 104px;
      height: 104px;
      left: 0;
      top: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 60;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0);
      transition: opacity 0.22s ease;
      background:
        radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(115,255,216,0.12) 22%, rgba(115,255,216,0.06) 42%, rgba(115,255,216,0.00) 72%);
      filter: blur(10px);
      mix-blend-mode: screen;
    }

    /* ===== Common Glass ===== */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--blur-strong);
      -webkit-backdrop-filter: var(--blur-strong);
      position: relative;
      overflow: hidden;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 28%, transparent 70%, rgba(255,255,255,0.06)),
        radial-gradient(circle at var(--shine-x) var(--shine-y), rgba(255,255,255,0.12), transparent 32%);
      opacity: 0.8;
    }

    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.28'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      opacity: 0.11;
    }

    /* ===== Top Right ===== */
    .copyright {
      position: fixed;
      top: 22px;
      right: 28px;
      z-index: 70;
      font-size: 0.78rem;
      letter-spacing: 1.3px;
      color: rgba(255,255,255,0.38);
      pointer-events: none;
    }

    /* ===== App Frame ===== */
    #app {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
    }

    /* ===== Home / Hero ===== */
    #home-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 12;
      transition: opacity 0.55s var(--ease-smooth), transform 0.72s var(--ease-spring);
    }

    #hero-section {
        
      width: min(92vw, 760px);
      text-align: center;
      transition: transform 0.72s var(--ease-spring), opacity 0.48s var(--ease-smooth);
    }

    body.dashboard-active #home-stage {
      opacity: 0;
      pointer-events: none;
    }

    body.dashboard-active #hero-section {
      transform: translateY(-18px) scale(0.96);
      opacity: 0;
    }

    #clock {
      font-size: clamp(4.8rem, 10vw, 8.6rem);
      line-height: 0.92;
      font-weight: 720;
      letter-spacing: -0.05em;
      text-shadow: 0 10px 30px rgba(0,0,0,0.35);
      margin-bottom: 12px;
    }

    #date {
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: var(--text-sub);
      letter-spacing: 0.02em;
      margin-bottom: 34px;
    }

    .search-wrapper {
      width: min(88vw, 680px);
      margin: 0 auto;
      position: relative;
    }

    #search-input {
      width: 100%;
      height: 70px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      outline: none;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.18),
        0 14px 38px rgba(0,0,0,0.20);
      backdrop-filter: var(--blur-soft);
      -webkit-backdrop-filter: var(--blur-soft);
      font-size: 1.12rem;
      transition:
        transform 0.35s var(--ease-smooth),
        background 0.35s var(--ease-smooth),
        border-color 0.35s var(--ease-smooth),
        box-shadow 0.35s var(--ease-smooth);
      user-select: auto;
    }

    #search-input::placeholder {
      color: rgba(255,255,255,0.52);
    }

    #search-input:focus {
      transform: translateY(-1px) scale(1.01);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.07));
      border-color: rgba(255,255,255,0.34);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.22),
        0 18px 48px rgba(0,0,0,0.28);
    }

    .search-hint {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-sub);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    #search-input:focus + .search-hint {
      opacity: 1;
    }

    /* ===== Dashboard ===== */
    #dashboard-stage {
      position: absolute;
      inset: 0;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s var(--ease-smooth);
    }

    body.dashboard-active #dashboard-stage {
      opacity: 1;
      pointer-events: auto;
    }


    .mini-clock {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .mini-date {
      font-size: 0.92rem;
      color: var(--text-sub);
    }

    

    body.dashboard-active #dashboard-panel {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }
    /* 让 dashboard 不再居中悬浮，而是更像真正面板 */
#dashboard-panel {
  position: absolute;
  left: 50%;
  top: calc(env(safe-area-inset-top, 0px) + 26px);
  width: min(1120px, 92vw);
  transform: translateX(-50%) scale(0.98);
  transform-origin: top center;
  display: flex;
  flex-direction: column;
  gap: 18px;
  opacity: 0;
  transition: transform 0.7s var(--ease-spring), opacity 0.4s var(--ease-smooth);
}

body.dashboard-active #dashboard-panel {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

.dashboard-topbar {
  min-height: 82px;
  border-radius: 28px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.dashboard-top-left {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dashboard-top-right {
  font-size: 0.82rem;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.42);
}

.dashboard-main {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}

.left-column {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.schedule-card {
  min-height: 0;
  height: auto;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.timeline {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  padding-right: 4px;
}

.mini-clock {
  font-size: 2rem;
  font-weight: 720;
  letter-spacing: -0.04em;
  line-height: 1;
}

.mini-date {
  font-size: 0.95rem;
  color: var(--text-sub);
}

/* 卡片统一更干净 */
.liquid-card {
  border-radius: 28px;
  padding: 22px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.16);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.24),
    0 18px 44px rgba(0,0,0,0.24);
}

/* Quick links 更紧凑 */
.links-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.link-item {
  min-height: 88px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
}

.link-icon {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.link-name {
  font-size: 0.92rem;
}

/* 日历缩一点，别太占 */
.calendar-wrap {
  padding-bottom: 18px;
}

.cal-grid {
  gap: 4px;
}

.cal-date {
  position: relative;
  width: 38px;
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
  justify-self: center;
  border-radius: 50%;
}

/* 右侧课表别过高，留出呼吸感 */


.period-item {
  min-height: 58px;
  border-radius: 16px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.05);
}

.period-time {
  flex: 0 0 96px;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.72);
}

.period-subject {
  font-size: 1rem;

}

.day-badge {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.18);
}

/* 去掉外部漂浮版权 */
.copyright {
  display: none;
}
    .liquid-card {
      border-radius: 30px;
      padding: 24px;
      min-width: 0;
      transform:
        perspective(1200px)
        rotateX(var(--card-rx))

        translate3d(var(--card-tx), var(--card-ty), 0);

        transform 0.22s ease,
        border-color 0.26s ease,
        box-shadow 0.26s ease,
        background 0.26s ease;
      will-change: transform;
    }

    .liquid-card:hover {
      border-color: rgba(255,255,255,0.28);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.34),
        inset 0 -1px 0 rgba(255,255,255,0.06),

    }

    .card-title {
      position: relative;
      z-index: 1;
      font-size: 1.02rem;
      font-weight: 620;
      color: rgba(255,255,255,0.88);

      letter-spacing: 0.02em;
    }

    .links-grid {

    }

    .link-item {

    /* ===== Calendar ===== */
    .calendar-wrap {
      min-height: 348px;
    }

    .cal-header {
      position: relative;
      z-index: 1;
      display: flex;

    }

      min-width: 0;
      min-height: 0;
      height: 100%;

    }

    .schedule-header {
      position: relative;

      align-items: center;
      margin-bottom: 20px;

    }

    .schedule-title-area h2 {
      font-size: 1.18rem;
      font-weight: 650;
      margin-bottom: 4px;
    }

    .schedule-title-area p {
      font-size: 0.92rem;
      color: var(--text-sub);
    }

    .day-badge {
      flex: 0 0 auto;
      padding: 7px 15px;
      border-radius: 999px;

      position: relative;

      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .period-item:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }

    .period-item.current {
      background: linear-gradient(135deg, rgba(115,255,216,0.15), rgba(115,255,216,0.04));
      border-color: rgba(115,255,216,0.26);
      box-shadow: inset 0 0 0 1px rgba(115,255,216,0.08);
    }

    .period-time {
      flex: 0 0 100px;
      font-size: 0.92rem;
      font-weight: 560;
      color: var(--text-sub);
    }

    .period-item.current .period-time {

      font-weight: 700;
    }

    .period-subject {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 1.06rem;
      font-weight: 620;
      color: #fff;
    }

       function syncScheduleHeight() {
      const leftColumn = document.querySelector('.left-column');

      scheduleCard.style.height = `${leftHeight}px`;
    }


    window.addEventListener('load', syncScheduleHeight);
    window.addEventListener('resize', syncScheduleHeight);
    window.addEventListener('orientationchange', syncScheduleHeight);

    const leftColumnEl = document.querySelector('.left-column');
    if (leftColumnEl) {
      const ro = new ResizeObserver(() => syncScheduleHeight());
      ro.observe(leftColumnEl);
    }

    const bgA = document.getElementById("bg-a");
    const bgB = document.getElementById("bg-b");
    let activeBg = bgA;
    let standbyBg = bgB;
    let lastBingUrl = "";

    const fallbackWallpapers = [
      "https://images.unsplash.com/photo-1506744626753-eba7bc10871e?q=80&w=1920&auto=format&fit=crop",
      "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?q=80&w=1920&auto=format&fit=crop",
      "https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1920&auto=format&fit=crop"
    ];

    function getFallbackWallpaper() {
      return fallbackWallpapers[Math.floor(Math.random() * fallbackWallpapers.length)];
    }

    // 結合了快取功能的新版 getBingWallpaper
    async function getBingWallpaper() {
      const today = new Date().toDateString();
      const cachedData = localStorage.getItem("bing_wallpaper_cache");
      
      if (cachedData) {
        const { url, date } = JSON.parse(cachedData);
        if (date === today && url) {
          return { url };
        }
      }

      const res = await fetch("/api/bing-wallpaper");
      if (!res.ok) {
        throw new Error(`Wallpaper API failed: ${res.status}`);
      }

      const data = await res.json();
      localStorage.setItem("bing_wallpaper_cache", JSON.stringify({
        url: data.url,
        date: today
      }));

      return data;
    }

    // 修復後完整的 swapBackground 函數
    async function swapBackground(initial = false) {
      let url = "";

      try {
        const data = await getBingWallpaper();
        url = data.url;

        if (!initial && url === lastBingUrl) return;
        lastBingUrl = url;
      } catch (err) {
        console.error("Bing 壁紙載入失敗，改用備用圖：", err);
        url = getFallbackWallpaper();
      }

      standbyBg.style.backgroundImage = `url("${url}")`;
      standbyBg.style.transform = "scale(1.08)";
      standbyBg.style.opacity = "0";

      requestAnimationFrame(() => {
        standbyBg.style.opacity = "1";
        standbyBg.style.transform = "scale(1.04)";
        activeBg.style.opacity = "0";
      });

      setTimeout(() => {
        const temp = activeBg;
        activeBg = standbyBg;
        standbyBg = temp;
        standbyBg.style.transform = "scale(1.08)";
      }, initial ? 50 : 1400);
    }



    /* =========================
       Hong Kong Time Helpers
    ========================= */
    function getHKParts(date = new Date()) {
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Hong_Kong",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(date);

      const map = {};
      parts.forEach(p => {
        if (p.type !== "literal") map[p.type] = p.value;
      });

      return {
        year: Number(map.year),
        month: Number(map.month),
        day: Number(map.day),
        hour: Number(map.hour),
        minute: Number(map.minute),
        second: Number(map.second)
      };
    }

    function getHKDateObject() {
      const p = getHKParts();
      return new Date(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
    }

    function isSameDay(d1, d2) {
      return (

      if (looksLikeURL(q)) {

    /* =========================
       Cursor Glow
    ========================= */
    const cursorGlow = document.getElementById("cursor-glow");

      }
    }

    function hideGlow() {
      pointerVisible = false;

    }

    window.addEventListener("pointermove", (e) => {
      if (e.pointerType === "touch") {
        hideGlow();

      }
      cursorGlow.style.left = `${e.clientX}px`;

    window.addEventListener("blur", hideGlow);
    window.addEventListener("touchstart", hideGlow, { passive: true });

    /* =========================
       Liquid Refraction Cards
    ========================= */
    function bindTilt(card) {
      const maxRotate = 5;
      const maxShift = 6;

      function reset() {
        card.style.setProperty("--card-rx", "0deg");
        card.style.setProperty("--card-ry", "0deg");
        card.style.setProperty("--card-tx", "0px");
        card.style.setProperty("--card-ty", "0px");
        card.style.setProperty("--shine-x", "50%");
        card.style.setProperty("--shine-y", "50%");
      }

      function update(clientX, clientY) {
        const rect = card.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const px = x / rect.width;
        const py = y / rect.height;

        const ry = (px - 0.5) * (maxRotate * 2);
        const rx = (0.5 - py) * (maxRotate * 2);

        const tx = (px - 0.5) * (maxShift * 2);
        const ty = (py - 0.5) * (maxShift * 2);

        card.style.setProperty("--card-rx", `${rx.toFixed(2)}deg`);
        card.style.setProperty("--card-ry", `${ry.toFixed(2)}deg`);
        card.style.setProperty("--card-tx", `${tx.toFixed(2)}px`);
        card.style.setProperty("--card-ty", `${ty.toFixed(2)}px`);
        card.style.setProperty("--shine-x", `${(px * 100).toFixed(1)}%`);
        card.style.setProperty("--shine-y", `${(py * 100).toFixed(1)}%`);
      }

      card.addEventListener("pointermove", (e) => {
        update(e.clientX, e.clientY);
      });

      card.addEventListener("pointerleave", reset);

      card.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        if (!t) return;
        update(t.clientX, t.clientY);
      }, { passive: true });

      card.addEventListener("touchend", reset);
      card.addEventListener("touchcancel", reset);

      reset();
    }

    document.querySelectorAll(".tilt-card").forEach(bindTilt);

    const schoolCalendar2026 = {
      3: { 28: "none", 29: "none", 30: "E", 31: "A" },
      4: {
        1: "none", 2: "none", 3: "none", 4: "none", 5: "none", 6: "none", 7: "none", 8: "none",
        9: "B", 10: "C", 11: "none", 12: "none", 13: "D", 14: "E", 15: "W", 16: "A", 17: "B",
        18: "none", 19: "none", 20: "C", 21: "D", 22: "W", 23: "E", 24: "A", 25: "none",
        26: "none", 27: "B", 28: "C", 29: "W", 30: "D"
      }
    };

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];
    const dayNamesShort = ["S", "M", "T", "W", "T", "F", "S"];

    const hkNow = getHKDateObject();
    let currentDate = new Date(hkNow.getFullYear(), hkNow.getMonth(), hkNow.getDate());
    let selectedDate = new Date(hkNow.getFullYear(), hkNow.getMonth(), hkNow.getDate());
    let viewMonthDate = new Date(hkNow.getFullYear(), hkNow.getMonth(), 1);

    const calMonthYear = document.getElementById("cal-month-year");
    const calGrid = document.getElementById("cal-grid");
    const scheduleDayTitle = document.getElementById("schedule-day-title");
    const scheduleDateSubtitle = document.getElementById("schedule-date-subtitle");
    const scheduleBadge = document.getElementById("schedule-badge");
    const scheduleList = document.getElementById("schedule-list");

    function getDayType(dateObj) {
      const y = dateObj.getFullYear();
      const m = dateObj.getMonth() + 1;
      const d = dateObj.getDate();
      if (y === 2026 && schoolCalendar2026[m] && schoolCalendar2026[m][d]) {
        return schoolCalendar2026[m][d];
      }
      return "none";
    }

    function renderCalendar() {
      const year = viewMonthDate.getFullYear();
      const month = viewMonthDate.getMonth();

      calMonthYear.textContent = `${monthNames[month]} ${year}`;
      calGrid.innerHTML = "";

      dayNamesShort.forEach(day => {
        calGrid.insertAdjacentHTML("beforeend", `<div class="cal-day-name">${day}</div>`);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      for (let i = firstDay - 1; i >= 0; i--) {
        calGrid.insertAdjacentHTML("beforeend", `<div class="cal-date muted">${daysInPrevMonth - i}</div>`);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(year, month, day);
        const dayType = getDayType(dateObj);
        const hasClass = dayType !== "none";

        let classes = "cal-date";
        if (isSameDay(dateObj, currentDate)) classes += " today";
        if (isSameDay(dateObj, selectedDate)) classes += " selected";

        calGrid.insertAdjacentHTML(
          "beforeend",
          `<div class="${classes}" data-year="${year}" data-month="${month}" data-day="${day}">
            ${day}
            ${hasClass ? '<div class="cal-dot"></div>' : ""}
          </div>`
        );
      }
    }

    calGrid.addEventListener("click", (e) => {
      const cell = e.target.closest(".cal-date[data-year]");
      if (!cell) return;

      const y = Number(cell.dataset.year);
      const m = Number(cell.dataset.month);
      const d = Number(cell.dataset.day);

      selectedDate = new Date(y, m, d);
      renderCalendar();
      renderSchedule();
    });

    document.getElementById("cal-prev").addEventListener("click", () => {
      viewMonthDate.setMonth(viewMonthDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("cal-next").addEventListener("click", () => {
      viewMonthDate.setMonth(viewMonthDate.getMonth() + 1);
      renderCalendar();
    });

    function timeToMinutes(rangeStartOrEnd) {
      const [h, m] = rangeStartOrEnd.split(":").map(Number);
      return h * 60 + m;
    }

    function renderSchedule() {
      const isToday = isSameDay(selectedDate, currentDate);
      scheduleDayTitle.textContent = isToday ? "Today's Schedule" : "Selected Schedule";
      scheduleDateSubtitle.textContent = new Intl.DateTimeFormat("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(selectedDate);

      const dayType = getDayType(selectedDate);

      if (dayType === "none" || !timetable[dayType]) {
        scheduleBadge.textContent = "Holiday";
        scheduleList.innerHTML = `<div class="empty-state">🎉 沒有排程，享受生活吧！</div>`;
        return;
      }

      scheduleBadge.textContent = `Day ${dayType}`;
      scheduleList.innerHTML = "";

      const hk = getHKParts();
      const currentMins = hk.hour * 60 + hk.minute;

      timetable[dayType].forEach(period => {
        const [startText, endText] = period.time.split("-");
        const start = timeToMinutes(startText);
        const end = timeToMinutes(endText);

        const isCurrent = isToday && currentMins >= start && currentMins < end;
        const displayName = subjectsMap[period.subject] || period.subject;

        scheduleList.insertAdjacentHTML(
          "beforeend",
          `<div class="period-item ${isCurrent ? "current" : ""}">
            <div class="period-time">${period.time}</div>
            <div class="period-subject">${displayName}</div>
            ${isCurrent ? '<div class="period-status">Now</div>' : ""}
          </div>`
        );
      });

      if (isToday) {
        requestAnimationFrame(() => {
          const currentEl = scheduleList.querySelector(".period-item.current");
          if (currentEl) {
            currentEl.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        });
      }
    }

    function refreshTodayDate() {
      const hkDate = getHKDateObject();
      currentDate = new Date(hkDate.getFullYear(), hkDate.getMonth(), hkDate.getDate());

      if (isSameDay(selectedDate, currentDate)) {
        renderSchedule();
      }
      renderCalendar();
    }

    renderCalendar();
    renderSchedule();

   

    setInterval(() => {
      refreshTodayDate();
    }, 60000);

  { thumb: "assets/wallpapers/thumbs/IMG_2046_thumb.jpeg", full: "assets/wallpapers/full/IMG_2046.jpeg" },

const wpModal = document.getElementById("wallpaper-modal-overlay");
const btnWallpaper = document.getElementById("btn-wallpaper");
const btnCloseModal = document.getElementById("modal-close");
const wpGrid = document.getElementById("wallpaper-grid");
const btnResetBing = document.getElementById("btn-reset-bing");
const bgLoader = document.getElementById("bg-loader");

function switchBackgroundTo(url, duration = 900) {
  standbyBg.style.backgroundImage = `url("${url}")`;
  standbyBg.style.transform = "scale(1.08)";
  standbyBg.style.opacity = "0";

  requestAnimationFrame(() => {
    standbyBg.style.opacity = "1";
    standbyBg.style.transform = "scale(1.04)";
    activeBg.style.opacity = "0";
  });

  setTimeout(() => {
    const temp = activeBg;
    activeBg = standbyBg;
    standbyBg = temp;
    standbyBg.style.transform = "scale(1.08)";
    standbyBg.style.opacity = "0";
  }, duration);
}

function applyCustomWallpaper(url) {
  if (!url) return;

  if (bgLoader) bgLoader.classList.add("active");

  const img = new Image();
  img.src = url;

  img.onload = () => {
    if (bgLoader) bgLoader.classList.remove("active");
    switchBackgroundTo(url, 120);
  };

  img.onerror = () => {
    if (bgLoader) bgLoader.classList.remove("active");
    console.error("自定义壁纸加载失败：", url);
  };
}

function renderWallpaperGrid() {
  wpGrid.innerHTML = "";
  const currentBg = localStorage.getItem("custom_wallpaper");

  customWallpapers.forEach((wp) => {
    const div = document.createElement("div");
    div.className = "wp-item";
    div.style.backgroundImage = `url("${wp.thumb}")`;

    if (currentBg === wp.full) {
      div.classList.add("active");
    }

    div.addEventListener("click", () => {
      localStorage.setItem("custom_wallpaper", wp.full);
      applyCustomWallpaper(wp.full);
      renderWallpaperGrid();
    });

    wpGrid.appendChild(div);
  });
}

btnWallpaper.addEventListener("click", (e) => {
  e.preventDefault();
  wpModal.classList.add("active");
  renderWallpaperGrid();
});

btnCloseModal.addEventListener("click", () => {
  wpModal.classList.remove("active");
});

wpModal.addEventListener("click", (e) => {
  if (e.target === wpModal) {
    wpModal.classList.remove("active");
  }
});

btnResetBing.addEventListener("click", () => {
  localStorage.removeItem("custom_wallpaper");
  wpModal.classList.remove("active");
  swapBackground(true);
});

function applyInstantBackground(url) {
  if (!url) return;
  activeBg.style.backgroundImage = `url("${url}")`;
  activeBg.style.opacity = "1";
  activeBg.style.transform = "scale(1.04)";
}

async function refreshBingWallpaperInBackground() {
  try {
    const data = await getBingWallpaper();
    if (!data?.url) return;

    const currentCustom = localStorage.getItem("custom_wallpaper");
    if (currentCustom) return;

    const cachedShown = localStorage.getItem("last_shown_wallpaper");
    if (cachedShown === data.url) return;

    localStorage.setItem("last_shown_wallpaper", data.url);
    switchBackgroundTo(data.url, 900);
  } catch (err) {
    console.error("后台刷新 Bing 壁纸失败：", err);
  }
}

function initAppBackground() {
  const customUrl = localStorage.getItem("custom_wallpaper");
  const cachedBing = localStorage.getItem("last_shown_wallpaper");

  if (customUrl) {
    applyInstantBackground(customUrl);
    return;
  }

  if (cachedBing) {
    applyInstantBackground(cachedBing);
  } else {
    applyInstantBackground(getFallbackWallpaper());
  }

  window.addEventListener("load", () => {
    if ("requestIdleCallback" in window) {
      requestIdleCallback(() => refreshBingWallpaperInBackground(), { timeout: 2000 });
    } else {
      setTimeout(refreshBingWallpaperInBackground, 800);
    }
  }, { once: true });
}

initAppBackground();

setInterval(() => {
  if (!localStorage.getItem("custom_wallpaper")) {
    swapBackground(false);
  }
}, 6 * 60 * 60 * 1000);
